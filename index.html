<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif);color:var(--color-text-primary);padding:1.5rem;font-size:14px}
h2{font-size:18px;font-weight:500;margin-bottom:4px}
.sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.5rem}
.grid-wrap{overflow-x:auto}
table{border-collapse:collapse;width:100%;table-layout:fixed}
th,td{padding:8px 10px;text-align:center;border:0.5px solid var(--color-border-tertiary);font-size:13px}
th{background:var(--color-background-secondary);font-weight:500}
td.label{text-align:left;font-weight:500;background:var(--color-background-secondary)}
td.diag{background:var(--color-background-secondary);color:var(--color-text-secondary)}
select{width:80px;padding:4px 2px;border:0.5px solid var(--color-border-secondary);border-radius:6px;background:var(--color-background-primary);color:var(--color-text-primary);font-size:12px;text-align:center}
select:focus{outline:none;box-shadow:0 0 0 2px var(--color-border-info)}
.cr-box{margin:1.5rem 0 1rem;padding:1rem 1.25rem;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.cr-val{font-size:28px;font-weight:500}
.cr-status{font-size:13px;margin-top:2px}
.pass{color:var(--color-text-success)}
.fail{color:var(--color-text-danger)}
.weights-box{margin-bottom:1.5rem}
.weights-box h3{font-size:14px;font-weight:500;margin-bottom:8px;color:var(--color-text-secondary)}
.w-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.w-label{width:120px;font-size:13px;font-weight:500}
.w-bar-wrap{flex:1;background:var(--color-border-tertiary);border-radius:4px;height:14px;overflow:hidden}
.w-bar{height:100%;border-radius:4px;transition:width 0.4s}
.w-num{width:50px;text-align:right;font-size:13px}
.suggestion{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1.5rem}
.suggestion h3{font-size:14px;font-weight:500;margin-bottom:10px}
.sug-item{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px;padding:6px 8px;border-radius:6px;background:var(--color-background-secondary)}
.sug-arrow{color:var(--color-text-secondary)}
.delta{font-size:12px;color:var(--color-text-success);margin-left:auto}
.apply-btn{padding:3px 10px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:6px;background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.apply-btn:hover{background:var(--color-background-secondary)}
.none-msg{font-size:13px;color:var(--color-text-secondary)}
</style>
</head>
<body>

<h2>AHP Pairwise Comparison</h2>
<p class="sub">Compare each criterion pair. Select how much more important the row criterion is vs the column.</p>

<div class="grid-wrap">
  <table id="ahp-table"></table>
</div>

<div class="cr-box">
  <div>
    <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:2px">Consistency Ratio (CR)</div>
    <div class="cr-val" id="cr-val">—</div>
    <div class="cr-status" id="cr-status">Enter values above</div>
  </div>
  <div style="flex:1;min-width:160px">
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">CR threshold: ≤ 0.10 = acceptable</div>
    <div style="height:8px;background:var(--color-border-tertiary);border-radius:4px;overflow:hidden">
      <div id="cr-bar" style="height:100%;background:#888;border-radius:4px;width:0%;transition:width 0.4s"></div>
    </div>
  </div>
</div>

<div class="weights-box">
  <h3>Criteria weights (geometric mean method)</h3>
  <div id="weights-out"></div>
</div>

<div class="suggestion" id="sug-box">
  <h3>Suggested adjustments</h3>
  <div id="sug-out"><p class="none-msg">Compute CR first.</p></div>
</div>

<script>
const LABELS = ["Timeliness","Ease of use","Accessibility"];
const N = LABELS.length;
const SAATY = [1/9,1/8,1/7,1/6,1/5,1/4,1/3,1/2,1,2,3,4,5,6,7,8,9];
const RI = {3:0.58,4:0.90,5:1.12,6:1.24,7:1.32,8:1.41,9:1.45,10:1.49};
const BAR_COLORS = ["#7F77DD","#1D9E75","#D85A30"];

const fmtV = v=>{
  for(let k=2;k<=9;k++) if(Math.abs(v-1/k)<1e-9) return `1/${k}`;
  return String(Math.round(v));
};

function optionsFor(i,j){
  const el = document.createElement("select");
  el.dataset.i=i; el.dataset.j=j;
  // Build full scale: 9/1 (row much more) to 1/9 (col much more)
  const scale = [
    {v:9,  label:"9 — row extreme"},
    {v:8,  label:"8"},
    {v:7,  label:"7 — row very strong"},
    {v:6,  label:"6"},
    {v:5,  label:"5 — row strong"},
    {v:4,  label:"4"},
    {v:3,  label:"3 — row moderate"},
    {v:2,  label:"2"},
    {v:1,  label:"1 — equal"},
    {v:1/2,label:"1/2"},
    {v:1/3,label:"1/3 — col moderate"},
    {v:1/4,label:"1/4"},
    {v:1/5,label:"1/5 — col strong"},
    {v:1/6,label:"1/6"},
    {v:1/7,label:"1/7 — col very strong"},
    {v:1/8,label:"1/8"},
    {v:1/9,label:"1/9 — col extreme"},
  ];
  scale.forEach(({v,label})=>{
    const o=document.createElement("option");
    o.value=v; o.textContent=label;
    if(v===1) o.selected=true;
    el.appendChild(o);
  });
  el.addEventListener("change",()=>{recompute(); renderSuggestions();});
  return el;
}

const selects = {}; // key "i-j"

function buildTable(){
  const t = document.getElementById("ahp-table");
  // header
  let hr="<tr><th></th>";
  LABELS.forEach(l=>{hr+=`<th>${l}</th>`});
  hr+="</tr>"; t.innerHTML=hr;
  // rows
  for(let i=0;i<N;i++){
    const tr=document.createElement("tr");
    const tdl=document.createElement("td");
    tdl.className="label"; tdl.textContent=LABELS[i];
    tr.appendChild(tdl);
    for(let j=0;j<N;j++){
      const td=document.createElement("td");
      if(i===j){td.className="diag";td.textContent="1";}
      else if(i<j){
        const sel=optionsFor(i,j);
        selects[`${i}-${j}`]=sel;
        td.appendChild(sel);
      } else {
        td.id=`mirror-${i}-${j}`;
        td.textContent="1";
        td.style.color="var(--color-text-secondary)";
      }
      tr.appendChild(td);
    }
    t.appendChild(tr);
  }
}

function getMatrix(){
  const m=Array.from({length:N},()=>Array(N).fill(1));
  for(let i=0;i<N;i++) for(let j=0;j<N;j++){
    if(i<j){const v=parseFloat(selects[`${i}-${j}`].value); m[i][j]=v; m[j][i]=1/v;}
  }
  return m;
}

function computeCR(m){
  const geo=m.map(row=>Math.pow(row.reduce((a,b)=>a*b,1),1/N));
  const sum=geo.reduce((a,b)=>a+b,0);
  const w=geo.map(v=>v/sum);
  const Aw=m.map((row,i)=>row.reduce((s,v,j)=>s+v*w[j],0));
  const lamMax=Aw.reduce((s,v,i)=>s+v/w[i],0)/N;
  const ci=(lamMax-N)/(N-1);
  return {cr:ci/RI[N],w};
}

function updateMirrors(m){
  for(let i=1;i<N;i++) for(let j=0;j<i;j++){
    const el=document.getElementById(`mirror-${i}-${j}`);
    if(el) el.textContent=fmtV(m[i][j]);
  }
}

function recompute(){
  const m=getMatrix();
  updateMirrors(m);
  const {cr,w}=computeCR(m);
  const crEl=document.getElementById("cr-val");
  const stEl=document.getElementById("cr-status");
  const barEl=document.getElementById("cr-bar");
  crEl.textContent=cr.toFixed(4);
  if(cr<=0.10){
    crEl.className="cr-val pass";
    stEl.innerHTML='<span class="pass">✓ Acceptable (CR ≤ 0.10)</span>';
    barEl.style.background="#1D9E75";
  } else {
    crEl.className="cr-val fail";
    stEl.innerHTML='<span class="fail">✗ Not consistent — see suggestions below</span>';
    barEl.style.background="#D85A30";
  }
  const pct=Math.min(cr*100,100);
  barEl.style.width=pct+"%";

  // weights
  const wo=document.getElementById("weights-out");
  const ranked=[...w.map((v,i)=>({i,v}))].sort((a,b)=>b.v-a.v);
  wo.innerHTML=ranked.map(({i,v})=>`
    <div class="w-row">
      <span class="w-label">${LABELS[i]}</span>
      <div class="w-bar-wrap"><div class="w-bar" style="width:${(v*100).toFixed(1)}%;background:${BAR_COLORS[i]}"></div></div>
      <span class="w-num">${(v*100).toFixed(1)}%</span>
    </div>`).join("");
  return {m,cr};
}

function saatySuggestions(val){
  const idx=SAATY.reduce((best,s,i)=>Math.abs(s-val)<Math.abs(SAATY[best]-val)?i:best,0);
  const out=[];
  if(idx>0) out.push(SAATY[idx-1]);
  if(idx<SAATY.length-1) out.push(SAATY[idx+1]);
  return out;
}

function renderSuggestions(){
  const m=getMatrix();
  const {cr}=computeCR(m);
  const so=document.getElementById("sug-out");
  if(cr<=0.10){
    so.innerHTML='<p class="none-msg" style="color:var(--color-text-success)">✓ Consistent — no adjustments needed.</p>';
    return;
  }
  // find top 3 improvements
  const candidates=[];
  for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){
    for(const nv of saatySuggestions(m[i][j])){
      const t=m.map(r=>[...r]);
      t[i][j]=nv; t[j][i]=1/nv;
      const {cr:nc}=computeCR(t);
      candidates.push({i,j,orig:m[i][j],nv,newCr:nc,delta:cr-nc});
    }
  }
  candidates.sort((a,b)=>b.delta-a.delta);
  const top=candidates.slice(0,3).filter(c=>c.delta>0);
  if(!top.length){
    so.innerHTML='<p class="none-msg">No single-step adjustment can improve CR further.</p>';
    return;
  }
  so.innerHTML=top.map((c,idx)=>`
    <div class="sug-item">
      <span style="color:var(--color-text-secondary);font-size:12px">#${idx+1}</span>
      <strong>${LABELS[c.i]}</strong>
      <span class="sug-arrow">vs</span>
      <strong>${LABELS[c.j]}</strong>
      <span style="color:var(--color-text-secondary)">:</span>
      <span>${fmtV(c.orig)}</span>
      <span class="sug-arrow">→</span>
      <span style="font-weight:500">${fmtV(c.nv)}</span>
      <span class="delta">CR ${c.newCr.toFixed(4)} (−${c.delta.toFixed(4)})</span>
      <button class="apply-btn" onclick="applyFix(${c.i},${c.j},${c.nv})">Apply</button>
    </div>`).join("");
}

function applyFix(i,j,nv){
  const sel=selects[`${i}-${j}`];
  if(!sel) return;
  // find closest option
  let best=null,bestDiff=Infinity;
  for(const opt of sel.options){
    const d=Math.abs(parseFloat(opt.value)-nv);
    if(d<bestDiff){bestDiff=d;best=opt;}
  }
  if(best) best.selected=true;
  recompute();
  renderSuggestions();
}

buildTable();
recompute();
renderSuggestions();
</script>
</body>
</html>
